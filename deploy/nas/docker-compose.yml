# Docker Compose configuration for fleet_memory durable Postgres instance on Synology NAS
#
# HOST PORT: published on 5433 (not 5432) because DSM's built-in PostgreSQL
# (/usr/bin/postgres -D /var/services/pgsql, serving synoindex) already binds
# 127.0.0.1:5432 on Synology. Container still listens on 5432 internally.
#
# FIREWALL REQUIREMENT:
# Configure DSM firewall (Control Panel → Security → Firewall) to allow TCP 5433 from:
#   - LAN subnet only (e.g., 192.168.1.0/24)
#   - Tailscale CGNAT range 100.64.0.0/10 (if NAS is on the tailnet)
#   - DENY all other sources
#
# This ensures the database is only accessible from the private network.

services:
  fleet_memory_postgres:
    image: pgvector/pgvector:pg16
    container_name: fleet_memory_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      # Relative to the compose project dir (the NAS docker root), like ./initdb
      # below. Avoids depending on ${NAS_DOCKER_ROOT} being present in docker
      # compose's environment on the NAS (it isn't — deploy.sh only renders the
      # DB password into the runtime .env). deploy.sh mkdir's ./pgdata first.
      - ./pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: fleet_memory
      POSTGRES_DB: fleet_memory
      # POSTGRES_PASSWORD loaded from .env file (rendered by deploy.sh)
